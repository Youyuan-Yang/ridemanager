[database]
connection_string = "Host=localhost;Port=5432;Database=ridemanager;Username=ridemanager;Password=ridemanager"

[models]
backend = "onnx"
directory = "models"

[[cameras]]
id = "CAM_FRONT"
enabled = true
device = "/dev/video0"
model = "yolo26n.onnx"
width = 1280
height = 720
input_width = 640
input_height = 640
fps = 30
confidence_threshold = 0.35
pixel_format = "MJPG"

[[cameras.models]]
model = "yolo26n.onnx"
input_width = 640
input_height = 640
confidence_threshold = 0.35

[[cameras]]
id = "CAM_FACE"
enabled = true
device = "/dev/video0"
model = "pfld_lite.onnx"
width = 640
height = 480
input_width = 112
input_height = 112
fps = 10
confidence_threshold = 0.60
pixel_format = "MJPG"

[[cameras]]
id = "CAM_BACK"
enabled = false
device = "/dev/video2"
model = "yolo26n.onnx"
width = 1280
height = 720
input_width = 640
input_height = 640
fps = 30
confidence_threshold = 0.35
pixel_format = "MJPG"
fisheye_fov_degrees = 180
fisheye_strength = 1.0
rear_center_danger_angle_degrees = 45
rear_edge_warning_min_score = 0.18

[sensors.radar]
enabled = true
transport = "bluetooth"
address = ""
device_name = "EVADAR-C6"
service_uuid = "0000ad01-0000-1000-8000-00805f9b34fb"
notify_uuid = "0000ad02-0000-1000-8000-00805f9b34fb"
config_uuid = "0000ad03-0000-1000-8000-00805f9b34fb"
health_uuid = "0000ad04-0000-1000-8000-00805f9b34fb"
match_by_service = true
subscribe_health = true
scan_timeout_seconds = 12.0
services_timeout_seconds = 10.0
reconnect_delay_seconds = 2.0
python_fallback_enabled = true
python_executable = "python3"
python_script = "scripts/ble_radar_stream.py"
python_fallback_timeout_seconds = 8.0
python_restart_delay_seconds = 2.0

[sensors.gyro]
enabled = false
transport = "serial"
address = "/dev/ttyS0"

[actuators.brake]
enabled = false

[actuators.speaker]
enabled = false

[app_sync]
enabled = true
device_name = "RideManager"
service_uuid = "7f7d0001-4f52-4d32-9b2a-0f0b5a8b1000"
rx_uuid = "7f7d0002-4f52-4d32-9b2a-0f0b5a8b1000"
tx_uuid = "7f7d0003-4f52-4d32-9b2a-0f0b5a8b1000"
max_page_size = 100
default_sync_window_hours = 24.0
notify_chunk_bytes = 180
max_request_bytes = 16384
